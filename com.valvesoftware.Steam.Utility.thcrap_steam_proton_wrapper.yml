app-id: com.valvesoftware.Steam.Utility.thcrap_steam_proton_wrapper
default-branch: stable
sdk: org.freedesktop.Sdk//25.08
runtime: com.valvesoftware.Steam
runtime-version: stable
build-extension: true
appstream-compose: false
build-options:
  prefix: /app/utils/thcrap_steam_proton_wrapper
modules:
  - name: thcrap_proton
    buildsystem: simple
    build-commands:
      - install -Dm755 thcrap_proton ${FLATPAK_DEST}/bin/thcrap_proton
      - install -Dm644 -t ${FLATPAK_DEST}/share/metainfo ${FLATPAK_ID}.metainfo.xml
      - appstreamcli compose --components=${FLATPAK_ID} --prefix=/ --origin=${FLATPAK_ID} --result-root=${FLATPAK_DEST} --data-dir=${FLATPAK_DEST}/share/app-info/xmls ${FLATPAK_DEST}
    sources:
      - type: git
        url: https://github.com/nerusuki/thcrap-steam-proton-wrapper.git
        commit: a5edfe44ead2df2e6bca54bd738ae0dc3284e679
      - type: file
        path: com.valvesoftware.Steam.Utility.thcrap_steam_proton_wrapper.metainfo.xml
